<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>签到二维码 - 会议签到</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:500px;width:100%;text-align:center}
h1{font-size:28px;color:#333;margin-bottom:10px}
.subtitle{color:#888;font-size:14px;margin-bottom:30px}
.url-input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:12px;font-size:15px;margin-bottom:15px;outline:none;transition:border-color 0.3s}
.url-input:focus{border-color:#667eea}
.btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:12px 30px;border-radius:12px;font-size:16px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.4)}
#qrcode{display:inline-block;margin:20px 0;padding:15px;background:#fff;border-radius:12px}
.tip{color:#999;font-size:13px;margin-top:10px}
.footer{margin-top:20px;color:rgba(255,255,255,0.7);font-size:13px}
</style>
</head>
<body>
<div class="card">
<h1>会议签到</h1>
<p class="subtitle">微信扫码即可签到</p>
<label style="display:block;text-align:left;font-size:13px;color:#666;margin-bottom:5px">签到页地址：</label>
<input type="text" class="url-input" id="urlInput" placeholder="输入签到页地址...">
<button class="btn" onclick="generateQR()">生成二维码</button>
<div id="qrcode"></div>
<p class="tip">微信扫描二维码打开签到页面</p>
</div>
<div class="footer">投屏展示此页面，参会者扫码签到</div>
<script>
var qrcode = null;
var defaultUrl = window.location.href.replace('qr-display.html', 'index.html');

// Check if running on GitHub Pages
if (window.location.hostname.includes('github.io')) {
    defaultUrl = window.location.href.replace('qr-display.html', 'index.html');
}

document.getElementById('urlInput').value = defaultUrl;
generateQR();

function generateQR() {
    var url = document.getElementById('urlInput').value.trim();
    if (!url) { alert('请输入签到页地址'); return; }
    var container = document.getElementById('qrcode');
    container.innerHTML = '';
    qrcode = new QRCode(container, {
        text: url,
        width: 250,
        height: 250,
        colorDark: '#333',
        colorLight: '#fff',
        correctLevel: QRCode.CorrectLevel.M
    });
}
</script>
</body>
</html>
