<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>会议签到 - 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f6fa;--card-bg:#fff;--primary:#2563eb;--primary-light:#dbeafe;
  --success:#16a34a;--success-light:#dcfce7;--danger:#dc2626;--danger-light:#fee2e2;
  --warning:#d97706;--warning-light:#fef3c7;--text:#1e293b;--text-secondary:#64748b;
  --text-muted:#94a3b8;--border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06)
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.hidden{display:none !important}

/* Tabs */
.tab-nav{display:flex;background:var(--card-bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.tab-nav button{flex:1;padding:14px 8px;border:none;background:none;font-size:14px;font-weight:500;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab-nav button.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-content{display:none;padding:16px;max-width:800px;margin:0 auto}
.tab-content.active{display:block}

/* Cards */
.card{background:var(--card-bg);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card h2{font-size:18px;font-weight:600;margin-bottom:16px;color:var(--text)}
.card h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}

/* Form */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;color:var(--text);background:var(--card-bg);outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.form-group textarea{resize:vertical;min-height:100px;font-family:inherit;font-size:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#15803d}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-outline{background:var(--card-bg);border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:#f8fafc}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-block{width:100%}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--card-bg);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow)}
.stat-card .num{font-size:28px;font-weight:700;line-height:1.2}
.stat-card .label{font-size:12px;color:var(--text-secondary);margin-top:4px}
.stat-card.blue .num{color:var(--primary)}.stat-card.blue{background:var(--primary-light)}
.stat-card.green .num{color:var(--success)}.stat-card.green{background:var(--success-light)}
.stat-card.red .num{color:var(--danger)}.stat-card.red{background:var(--danger-light)}

/* Progress bar */
.progress-bar{width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-bar .fill{height:100%;background:var(--primary);border-radius:4px;transition:width .5s}

/* Table */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f8fafc;padding:10px 12px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border)}
tbody tr:hover{background:#f8fafc}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}
.badge-success{background:var(--success-light);color:var(--success)}
.badge-danger{background:var(--danger-light);color:var(--danger)}

/* Search */
.search-box{position:relative;margin-bottom:14px}
.search-box input{padding-right:40px}
.search-box .clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:var(--text-muted);cursor:pointer;line-height:1}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--card-bg);border-radius:var(--radius);padding:24px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:16px}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:2000;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Attendee select list */
.attendee-list{max-height:400px;overflow-y:auto}
.attendee-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.attendee-item:hover{background:#f8fafc}
.attendee-item .info{flex:1;min-width:0}
.attendee-item .name{font-size:15px;font-weight:500}
.attendee-item .detail{font-size:12px;color:var(--text-secondary);margin-top:2px}
.attendee-item.checked-in{opacity:.6;pointer-events:none}

/* Large screen mode */
.dashboard-screen{background:#0f172a;color:#e2e8f0;min-height:100vh}
.dashboard-screen .stats-grid{grid-template-columns:repeat(3,1fr)}
.dashboard-screen .stat-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#e2e8f0}
.dashboard-screen .stat-card .label{color:rgba(255,255,255,.6)}
.dashboard-screen .stat-card .num{color:#60a5fa}
.dashboard-screen .stat-card.green .num{color:#4ade80}
.dashboard-screen .stat-card.red .num{color:#f87171}
.dashboard-screen h2{color:#f1f5f9}
.dashboard-screen .progress-bar{background:rgba(255,255,255,.15)}
.dashboard-screen .progress-bar .fill{background:#3b82f6}
.dashboard-screen .checkin-list{max-height:calc(100vh - 280px);overflow-y:auto}
.dashboard-screen .checkin-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:14px}
.dashboard-screen .checkin-item .time{color:rgba(255,255,255,.5);font-size:12px;width:50px;flex-shrink:0}
.dashboard-screen .checkin-item .name{font-weight:500;flex:1}
.dashboard-screen .checkin-item .new-badge{font-size:10px;background:#f59e0b;color:#000;padding:2px 6px;border-radius:4px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Admin header */
.admin-header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:12px 16px;text-align:center;font-size:13px;position:sticky;top:0;z-index:99}
.admin-header a{color:#93c5fd;text-decoration:none}

@media(max-width:480px){
  .tab-nav button{font-size:12px;padding:12px 6px}
  .stats-grid{grid-template-columns:repeat(3,1fr);gap:6px}
  .stat-card{padding:12px 8px}
  .stat-card .num{font-size:22px}
  .btn{font-size:13px;padding:8px 14px}
}
</style>
</head>
<body>

<div class="admin-header">
  管理后台 | 签到页面: <a href="./index.html" target="_blank">签到入口</a> | <a href="./qr-display.html" target="_blank">二维码</a>
</div>

<!-- Tab Navigation -->
<nav class="tab-nav" id="tabNav">
  <button data-tab="admin" class="active">管理</button>
  <button data-tab="signin">签到</button>
  <button data-tab="dashboard">大屏</button>
</nav>

<!-- ==================== 管理后台 ==================== -->
<div class="tab-content active" id="tab-admin">
  <div class="card">
    <h2>管理后台</h2>
    <div class="btn-group" style="margin-bottom:16px">
      <button class="btn btn-primary" id="btnImport">导入参会名单</button>
      <button class="btn btn-outline" id="btnAddPerson">手动添加</button>
      <button class="btn btn-success" id="btnExport">导出签到表</button>
      <button class="btn btn-danger btn-outline" id="btnClear">清空数据</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card blue"><div class="num" id="statTotal">0</div><div class="label">参会总人数</div></div>
      <div class="stat-card green"><div class="num" id="statChecked">0</div><div class="label">已签到</div></div>
      <div class="stat-card red"><div class="num" id="statUnchecked">0</div><div class="label">未签到</div></div>
    </div>
    <div class="progress-bar"><div class="fill" id="checkinProgress" style="width:0%"></div></div>
    <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:4px">签到率 <span id="checkinRate">0%</span></p>
  </div>

  <div class="card">
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-outline btn-sm" id="filterAll" style="background:var(--primary);color:#fff">全部</button>
      <button class="btn btn-outline btn-sm" id="filterChecked">已签到</button>
      <button class="btn btn-outline btn-sm" id="filterUnchecked">未签到</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>姓名</th><th>手机号</th><th>单位</th><th>签到时间</th><th>状态</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 导入模态框 -->
  <div class="modal-overlay hidden" id="importModal">
    <div class="modal">
      <h3>导入参会名单</h3>
      <div class="form-group">
        <label>粘贴名单（每行一个，格式: 姓名,手机号,单位）</label>
        <textarea id="importText" placeholder="张三,13800138000,市场部&#10;李四,13900139000,技术部&#10;王五,,行政部"></textarea>
      </div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">每行一个参会者，用逗号分隔：姓名,手机号,单位。手机号和单位可省略。</p>
      <div class="form-group">
        <label>或上传Excel/CSV文件</label>
        <input type="file" id="importFile" accept=".csv,.xlsx,.xls">
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="btnConfirmImport">确认导入</button>
        <button class="btn btn-outline" id="btnCancelImport">取消</button>
      </div>
    </div>
  </div>

  <!-- 手动添加模态框 -->
  <div class="modal-overlay hidden" id="addPersonModal">
    <div class="modal">
      <h3>手动添加参会者</h3>
      <div class="form-group">
        <label>姓名 *</label>
        <input type="text" id="addName" placeholder="请输入姓名">
      </div>
      <div class="form-group">
        <label>手机号</label>
        <input type="tel" id="addPhone" placeholder="请输入手机号">
      </div>
      <div class="form-group">
        <label>单位/部门</label>
        <input type="text" id="addDept" placeholder="请输入单位或部门">
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="btnConfirmAdd">确认添加</button>
        <button class="btn btn-outline" id="btnCancelAdd">取消</button>
      </div>
    </div>
  </div>
</div>

<!-- ==================== 签到页面 ==================== -->
<div class="tab-content" id="tab-signin">
  <div class="card" style="text-align:center;background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;padding:32px 20px">
    <h2 style="color:#fff;font-size:24px;margin-bottom:8px">会议签到</h2>
    <p style="color:rgba(255,255,255,.8);font-size:14px">管理员代签到</p>
  </div>

  <div class="card">
    <div class="btn-group" style="margin-bottom:16px">
      <button class="btn" id="modeSelect" style="flex:1">从名单选择签到</button>
      <button class="btn btn-outline" id="modeSearch" style="flex:1">搜索姓名签到</button>
      <button class="btn btn-outline" id="modeManual" style="flex:1">手动填写签到</button>
    </div>

    <div id="panelSelect">
      <div class="search-box">
        <input type="text" id="searchSelect" placeholder="搜索姓名或手机号..." autocomplete="off">
        <button class="clear-btn" id="clearSelect">&times;</button>
      </div>
      <div class="attendee-list" id="selectList"></div>
      <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-top:12px" id="selectEmpty">暂无参会名单，请先导入</p>
    </div>

    <div id="panelSearch" class="hidden">
      <div class="form-group">
        <label>输入姓名或手机号</label>
        <input type="text" id="searchInput" placeholder="请输入姓名或手机号..." autocomplete="off">
      </div>
      <div id="searchResult" style="margin-top:8px"></div>
    </div>

    <div id="panelManual" class="hidden">
      <div class="form-group">
        <label>姓名 *</label>
        <input type="text" id="manualName" placeholder="请输入姓名">
      </div>
      <div class="form-group">
        <label>手机号</label>
        <input type="tel" id="manualPhone" placeholder="请输入手机号（选填）">
      </div>
      <div class="form-group">
        <label>单位/部门</label>
        <input type="text" id="manualDept" placeholder="请输入单位或部门（选填）">
      </div>
      <button class="btn btn-primary btn-block" id="btnManualSignin">确认签到</button>
    </div>
  </div>

  <div id="signinSuccess" class="card hidden" style="text-align:center;background:var(--success-light)">
    <div style="font-size:48px;margin-bottom:8px">&#10003;</div>
    <h2 style="color:var(--success)">签到成功</h2>
    <p style="color:var(--text-secondary)" id="signinName"></p>
    <p style="color:var(--text-muted);font-size:13px" id="signinTime"></p>
  </div>
</div>

<!-- ==================== 签到大屏 ==================== -->
<div class="tab-content" id="tab-dashboard">
  <div class="dashboard-screen" style="padding:16px">
    <div style="max-width:900px;margin:0 auto">
      <div style="text-align:center;padding:20px 0">
        <h2 style="font-size:24px;font-weight:700;margin-bottom:4px">实时签到大屏</h2>
        <p style="color:rgba(255,255,255,.5);font-size:13px" id="dashTime"></p>
      </div>
      <div class="stats-grid">
        <div class="stat-card blue"><div class="num" id="dashTotal">0</div><div class="label">参会总人数</div></div>
        <div class="stat-card green"><div class="num" id="dashChecked">0</div><div class="label">已签到</div></div>
        <div class="stat-card red"><div class="num" id="dashUnchecked">0</div><div class="label">未签到</div></div>
      </div>
      <div class="progress-bar"><div class="fill" id="dashProgress" style="width:0%"></div></div>
      <p style="text-align:center;color:rgba(255,255,255,.6);font-size:14px;margin-top:6px">签到率 <span id="dashRate" style="color:#60a5fa;font-weight:600">0%</span></p>
      <div style="margin-top:20px">
        <h3 style="font-size:16px;margin-bottom:12px;color:rgba(255,255,255,.7)">签到记录</h3>
        <div class="checkin-list" id="dashCheckinList"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ==================== 数据管理 ====================
const STORAGE_KEY = 'meeting_checkin_data';

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { attendees: [], checkins: {} };
}

function saveData(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let data = loadData();

function getStats(){
  const total = data.attendees.length;
  const checked = Object.keys(data.checkins).length;
  return { total, checked, unchecked: total - checked, rate: total > 0 ? Math.round(checked/total*100) : 0 };
}

// ==================== Toast ====================
function showToast(msg, duration = 2000){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), duration);
}

// ==================== 签到功能 ====================
const modeSelect = document.getElementById('modeSelect');
const modeSearch = document.getElementById('modeSearch');
const modeManual = document.getElementById('modeManual');
const panelSelect = document.getElementById('panelSelect');
const panelSearch = document.getElementById('panelSearch');
const panelManual = document.getElementById('panelManual');

function switchSigninMode(mode){
  [modeSelect, modeSearch, modeManual].forEach(b => { b.classList.add('btn-outline'); b.classList.remove('btn-primary'); });
  [panelSelect, panelSearch, panelManual].forEach(p => p.classList.add('hidden'));
  switch(mode){
    case 'select':
      modeSelect.classList.remove('btn-outline'); modeSelect.classList.add('btn-primary');
      panelSelect.classList.remove('hidden'); renderSelectList(); break;
    case 'search':
      modeSearch.classList.remove('btn-outline'); modeSearch.classList.add('btn-primary');
      panelSearch.classList.remove('hidden'); break;
    case 'manual':
      modeManual.classList.remove('btn-outline'); modeManual.classList.add('btn-primary');
      panelManual.classList.remove('hidden'); break;
  }
}

modeSelect.addEventListener('click', () => switchSigninMode('select'));
modeSearch.addEventListener('click', () => switchSigninMode('search'));
modeManual.addEventListener('click', () => switchSigninMode('manual'));

function renderSelectList(filter = ''){
  const list = document.getElementById('selectList');
  const empty = document.getElementById('selectEmpty');
  const q = filter.toLowerCase();
  const filtered = data.attendees.filter(a => {
    if(!q) return true;
    return a.name.toLowerCase().includes(q) || (a.phone && a.phone.includes(q));
  });

  if(data.attendees.length === 0){
    list.innerHTML = ''; empty.classList.remove('hidden'); return;
  }
  empty.classList.add('hidden');

  if(filtered.length === 0){
    list.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px">无匹配结果</p>'; return;
  }

  list.innerHTML = filtered.map(a => {
    const isChecked = data.checkins[a.id] !== undefined;
    const checkTime = data.checkins[a.id] || '';
    const cls = isChecked ? 'checked-in' : '';
    const icon = isChecked ? '<span style="color:var(--success);font-size:20px">&#10003;</span>' : '<span style="color:var(--text-muted);font-size:14px">签到 &rarr;</span>';
    const detail = [a.phone, a.dept].filter(Boolean).join(' | ') || '无详细信息';
    return `<div class="attendee-item ${cls}" data-id="${a.id}">
      <div class="info">
        <div class="name">${escHtml(a.name)}${isChecked ? ' <span class="badge badge-success">已签到</span>' : ''}</div>
        <div class="detail">${escHtml(detail)}${isChecked ? ' | ' + checkTime : ''}</div>
      </div>
      ${icon}
    </div>`;
  }).join('');

  list.querySelectorAll('.attendee-item:not(.checked-in)').forEach(el => {
    el.addEventListener('click', () => doCheckin(el.dataset.id));
  });
}

document.getElementById('searchSelect').addEventListener('input', function(){ renderSelectList(this.value); });
document.getElementById('clearSelect').addEventListener('click', function(){ document.getElementById('searchSelect').value = ''; renderSelectList(); });

document.getElementById('searchInput').addEventListener('input', function(){
  const q = this.value.trim().toLowerCase();
  const result = document.getElementById('searchResult');
  if(!q){ result.innerHTML = ''; return; }
  const matches = data.attendees.filter(a => a.name.toLowerCase().includes(q) || (a.phone && a.phone.includes(q)));
  if(matches.length === 0){
    result.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:10px">未找到匹配的参会者</p>';
  }else{
    result.innerHTML = matches.map(a => {
      const isChecked = data.checkins[a.id] !== undefined;
      return `<div class="attendee-item ${isChecked ? 'checked-in' : ''}" data-id="${a.id}" style="${isChecked?'':'cursor:pointer'}">
        <div class="info">
          <div class="name">${escHtml(a.name)}${isChecked ? ' <span class="badge badge-success">已签到</span>' : ''}</div>
          <div class="detail">${escHtml([a.phone,a.dept].filter(Boolean).join(' | ') || '')}</div>
        </div>
        ${isChecked ? '<span style="color:var(--success)">&#10003;</span>' : '<button class="btn btn-primary btn-sm">签到</button>'}
      </div>`;
    }).join('');
    result.querySelectorAll('.attendee-item:not(.checked-in)').forEach(el => {
      el.addEventListener('click', () => doCheckin(el.dataset.id));
    });
  }
});

document.getElementById('btnManualSignin').addEventListener('click', function(){
  const name = document.getElementById('manualName').value.trim();
  if(!name){ showToast('请输入姓名'); return; }
  const phone = document.getElementById('manualPhone').value.trim();
  const dept = document.getElementById('manualDept').value.trim();
  let person = data.attendees.find(a => a.name === name && a.phone === phone);
  if(!person){
    person = { id: 'm' + Date.now(), name, phone, dept: dept || '' };
    data.attendees.push(person);
  }
  saveData(data);
  doCheckin(person.id);
  document.getElementById('manualName').value = '';
  document.getElementById('manualPhone').value = '';
  document.getElementById('manualDept').value = '';
});

function doCheckin(id){
  if(data.checkins[id]){ showToast('该参会者已签到'); return; }
  const now = new Date();
  const time = now.toLocaleString('zh-CN', { hour12: false });
  data.checkins[id] = time;
  saveData(data);

  const person = data.attendees.find(a => a.id === id);
  document.getElementById('signinName').textContent = person ? person.name : '';
  document.getElementById('signinTime').textContent = '签到时间：' + time;

  const panel = document.getElementById('signinSuccess');
  panel.classList.remove('hidden');
  [panelSelect, panelSearch, panelManual].forEach(p => p.classList.add('hidden'));

  setTimeout(() => {
    panel.classList.add('hidden');
    switchSigninMode('select');
  }, 3000);

  refreshAll();
  showToast('签到成功！');
}

// ==================== 管理后台 ====================
function refreshAdminTable(filter = 'all'){
  const tbody = document.getElementById('adminTableBody');
  let rows = data.attendees;
  if(filter === 'checked') rows = rows.filter(a => data.checkins[a.id] !== undefined);
  if(filter === 'unchecked') rows = rows.filter(a => data.checkins[a.id] === undefined);

  if(rows.length === 0){
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:20px">暂无数据</td></tr>';
  }else{
    tbody.innerHTML = rows.map(a => {
      const isChecked = data.checkins[a.id] !== undefined;
      const time = data.checkins[a.id] || '-';
      const status = isChecked ? '<span class="badge badge-success">已签到</span>' : '<span class="badge badge-danger">未签到</span>';
      return `<tr>
        <td>${escHtml(a.name)}</td>
        <td>${escHtml(a.phone || '-')}</td>
        <td>${escHtml(a.dept || '-')}</td>
        <td>${escHtml(time)}</td>
        <td>${status}</td>
        <td>
          ${isChecked ? `<button class="btn btn-outline btn-sm undo-btn" data-id="${a.id}">撤销</button>` : ''}
          <button class="btn btn-outline btn-sm del-btn" data-id="${a.id}" style="color:var(--danger)">删除</button>
        </td>
      </tr>`;
    }).join('');

    tbody.querySelectorAll('.undo-btn').forEach(btn => {
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        delete data.checkins[this.dataset.id];
        saveData(data);
        refreshAll();
        showToast('已撤销签到');
      });
    });
    tbody.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        if(!confirm('确认删除该参会者？')) return;
        data.attendees = data.attendees.filter(a => a.id !== this.dataset.id);
        delete data.checkins[this.dataset.id];
        saveData(data);
        refreshAll();
        showToast('已删除');
      });
    });
  }

  const stats = getStats();
  document.getElementById('statTotal').textContent = stats.total;
  document.getElementById('statChecked').textContent = stats.checked;
  document.getElementById('statUnchecked').textContent = stats.unchecked;
  document.getElementById('checkinProgress').style.width = stats.rate + '%';
  document.getElementById('checkinRate').textContent = stats.rate + '%';
}

// 导入
document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('importModal').classList.remove('hidden');
  document.getElementById('importText').value = '';
  document.getElementById('importFile').value = '';
});
document.getElementById('btnCancelImport').addEventListener('click', () => {
  document.getElementById('importModal').classList.add('hidden');
});

document.getElementById('btnConfirmImport').addEventListener('click', function(){
  const text = document.getElementById('importText').value.trim();
  const fileInput = document.getElementById('importFile');
  const file = fileInput.files[0];

  function parseAndImport(raw){
    const lines = raw.split(/[\r\n]+/).filter(l => l.trim());
    if(lines.length === 0){ showToast('无有效数据'); return; }
    let count = 0;
    lines.forEach(line => {
      const parts = line.split(/[,\t，]/).map(s => s.trim()).filter(s => s);
      if(parts.length === 0) return;
      const name = parts[0];
      if(!name) return;
      const phone = parts[1] || '';
      const dept = parts[2] || '';
      const exists = data.attendees.find(a => a.name === name && a.phone === phone);
      if(!exists){
        data.attendees.push({ id: 'a' + Date.now() + '_' + count, name, phone, dept });
        count++;
      }
    });
    saveData(data);
    refreshAll();
    document.getElementById('importModal').classList.add('hidden');
    showToast(`成功导入 ${count} 名参会者`);
  }

  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      try{
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const csv = XLSX.utils.sheet_to_csv(sheet);
        parseAndImport(csv);
      }catch(err){
        showToast('文件解析失败，请检查格式');
      }
    };
    reader.readAsArrayBuffer(file);
  }else if(text){
    parseAndImport(text);
  }else{
    showToast('请粘贴名单或上传文件');
  }
});

// 手动添加
document.getElementById('btnAddPerson').addEventListener('click', () => {
  document.getElementById('addPersonModal').classList.remove('hidden');
});
document.getElementById('btnCancelAdd').addEventListener('click', () => {
  document.getElementById('addPersonModal').classList.add('hidden');
});
document.getElementById('btnConfirmAdd').addEventListener('click', function(){
  const name = document.getElementById('addName').value.trim();
  if(!name){ showToast('请输入姓名'); return; }
  const phone = document.getElementById('addPhone').value.trim();
  const dept = document.getElementById('addDept').value.trim();
  data.attendees.push({ id: 'a' + Date.now(), name, phone, dept });
  saveData(data);
  refreshAll();
  document.getElementById('addPersonModal').classList.add('hidden');
  document.getElementById('addName').value = '';
  document.getElementById('addPhone').value = '';
  document.getElementById('addDept').value = '';
  showToast('添加成功');
});

// 导出
document.getElementById('btnExport').addEventListener('click', function(){
  const stats = getStats();
  let csv = '\uFEFF姓名,手机号,单位,签到状态,签到时间\n';
  data.attendees.forEach(a => {
    const isChecked = data.checkins[a.id] !== undefined;
    csv += `${a.name},${a.phone || ''},${a.dept || ''},${isChecked ? '已签到' : '未签到'},${data.checkins[a.id] || ''}\n`;
  });
  csv += `\n统计,,,,\n总人数,${stats.total},已签到,${stats.checked},签到率,${stats.rate}%`;

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `会议签到表_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('导出成功');
});

// 清空
document.getElementById('btnClear').addEventListener('click', function(){
  if(!confirm('确认清空所有签到数据？此操作不可恢复！')) return;
  data = { attendees: [], checkins: {} };
  saveData(data);
  refreshAll();
  showToast('数据已清空');
});

// 筛选
let currentFilter = 'all';
document.getElementById('filterAll').addEventListener('click', function(){ setActiveFilter(this, 'all'); refreshAdminTable('all'); });
document.getElementById('filterChecked').addEventListener('click', function(){ setActiveFilter(this, 'checked'); refreshAdminTable('checked'); });
document.getElementById('filterUnchecked').addEventListener('click', function(){ setActiveFilter(this, 'unchecked'); refreshAdminTable('unchecked'); });

function setActiveFilter(btn, filter){
  currentFilter = filter;
  document.querySelectorAll('#tab-admin .btn-outline.btn-sm').forEach(b => {
    b.style.background = ''; b.style.color = '';
  });
  btn.style.background = 'var(--primary)';
  btn.style.color = '#fff';
}

// ==================== 签到大屏 ====================
function refreshDashboard(){
  const stats = getStats();
  document.getElementById('dashTotal').textContent = stats.total;
  document.getElementById('dashChecked').textContent = stats.checked;
  document.getElementById('dashUnchecked').textContent = stats.unchecked;
  document.getElementById('dashProgress').style.width = stats.rate + '%';
  document.getElementById('dashRate').textContent = stats.rate + '%';
  document.getElementById('dashTime').textContent = new Date().toLocaleString('zh-CN', { hour12: false });

  const list = document.getElementById('dashCheckinList');
  const checkins = Object.entries(data.checkins).sort((a, b) => b[1].localeCompare(a[1]));
  if(checkins.length === 0){
    list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,.3);padding:20px">暂无签到记录</p>';
  }else{
    const latestTime = checkins[0] ? checkins[0][1] : '';
    list.innerHTML = checkins.map(([id, time]) => {
      const person = data.attendees.find(a => a.id === id);
      const name = person ? person.name : '未知';
      const dept = person ? (person.dept || '') : '';
      const isNew = time === latestTime;
      return `<div class="checkin-item">
        <span class="time">${time.slice(-8)}</span>
        <span class="name">${escHtml(name)}</span>
        <span style="color:rgba(255,255,255,.4);font-size:12px">${escHtml(dept)}</span>
        ${isNew ? '<span class="new-badge">NEW</span>' : ''}
      </div>`;
    }).join('');
  }
}

// ==================== Tab切换 ====================
document.querySelectorAll('#tabNav button').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('#tabNav button').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const tab = this.dataset.tab;
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if(tab === 'dashboard') refreshDashboard();
    if(tab === 'admin') refreshAdminTable(currentFilter);
    if(tab === 'signin'){
      document.getElementById('signinSuccess').classList.add('hidden');
      switchSigninMode('select');
      renderSelectList();
    }
  });
});

// ==================== 全量刷新 ====================
function refreshAll(){
  refreshAdminTable(currentFilter);
  const dashTab = document.getElementById('tab-dashboard');
  if(dashTab.classList.contains('active')) refreshDashboard();
  if(document.getElementById('tab-signin').classList.contains('active')){
    renderSelectList();
    document.getElementById('searchResult').innerHTML = '';
    document.getElementById('searchInput').value = '';
  }
}

// ==================== 工具函数 ====================
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ==================== 初始化 ====================
refreshAdminTable();
renderSelectList();

let dashInterval;
document.querySelector('[data-tab="dashboard"]').addEventListener('click', () => {
  refreshDashboard();
  if(!dashInterval) dashInterval = setInterval(refreshDashboard, 3000);
});

const dashObserver = new MutationObserver(() => {
  if(!document.getElementById('tab-dashboard').classList.contains('active') && dashInterval){
    clearInterval(dashInterval); dashInterval = null;
  }
});
dashObserver.observe(document.getElementById('tab-dashboard'), { attributes: true, attributeFilter: ['class'] });
</script>
